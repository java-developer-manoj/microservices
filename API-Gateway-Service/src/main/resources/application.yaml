spring:
  application:
    name: API-Gateway-Service
  cloud:
    gateway:
      routes:
      - id: user-service
        uri: lb://USER-SERVICE
        predicates:
          - Path=/web/api/v1/user-service/**
        filters:
              - StripPrefix=4
#              - AuthenticationFilter

      - id: product-service
        uri: lb://PRODUCT-SERVICE
        predicates:
          - Path=/web/api/v1/product-service/**
        filters:
          - StripPrefix=4
#          - AuthenticationFilter

      - id: auth-service
        uri: lb://AUTH-SERVICE
        predicates:
          - Path=/web/api/v1/auth-service/**
        filters:
          - StripPrefix=4

      - id: reviews-service
        uri: lb://REVIWES-SERVICE
        predicates:
         - Path=/web/api/v1/reviews-service/**
        filters:
          - StripPrefix=4

  boot:
    admin:
      client:
        url: http://localhost:8090/
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
    exposure:
      include: '*'

server:
  port: 9000