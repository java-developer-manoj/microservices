spring:
  application:
    name: Reviews-Service
  config:
    import: optional:configserver:http://localhost:9121

  datasource:
    url: jdbc:postgresql://localhost:5432/reviews_service
    username: postgres
    password: admin

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
server:
  port: 8122