spring:
  application:
    name: Auth-Service

  config:
    import: optional:configserver:http://localhost:9121

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_service
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 1111
logging:
  level:
    org.flywaydb: DEBUG